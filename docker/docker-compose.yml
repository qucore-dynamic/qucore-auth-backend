services:
  audit:
    build:
      context: ../services/audit
      dockerfile: dockerfile
    ports:
      - '${AUDIT_SERVICE}:${AUDIT_SERVICE}'
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  auth:
    build:
      context: ../services/auth
      dockerfile: dockerfile
    ports:
      - '${AUTH_SERVICE}:${AUTH_SERVICE}'
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  invite:
    build:
      context: ../services/invite
      dockerfile: dockerfile
    ports:
      - '${INVITE_SERVICE}:${INVITE_SERVICE}'
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  metrics:
    build:
      context: ../services/metrics
      dockerfile: dockerfile
    ports:
      - '${METRICS_SERVICE}:${METRICS_SERVICE}'
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  org:
    build:
      context: ../services/org
      dockerfile: dockerfile
    ports:
      - '${ORG_SERVICE}:${ORG_SERVICE}'
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  users:
    build:
      context: ../services/users
      dockerfile: dockerfile
    ports:
      - '${USERS_SERVICE}:${USERS_SERVICE}'
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17-alpine
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    restart: always
    env_file:
      - .env
    ports:
      - '${REDIS_PORT}:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
